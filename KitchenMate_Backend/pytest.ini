[pytest]
DJANGO_SETTINGS_MODULE = core.settings
python_files = tests/test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests — kiểm tra từng thành phần độc lập
    integration: Integration tests — kiểm tra luồng API end-to-end
    performance: Performance tests — kiểm tra hiệu năng dưới tải lớn
    pbt: Property-Based Tests — dùng Hypothesis để kiểm tra invariants
